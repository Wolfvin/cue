name: Publish to npm

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build --filter=!./examples/**

      - name: Publish all packages
        run: |
          for pkg in packages/core packages/react packages/css packages/player packages/recorder packages/analytics-server packages/mcp; do
            echo "Publishing $pkg..."
            cd $pkg
            npm publish --access public || true
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}