<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankFlow — Modern Banking, Simplified</title>
  <meta name="description" content="BankFlow fintech demo — interactive banking flow showcase built with cue SDK's demo theater and scripted pointer animation.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #2563EB;
      --accent-light: #3b82f6;
      --accent-glow: rgba(37, 99, 235, 0.2);
      --bg: #0a0f1a;
      --bg-card: #111827;
      --border: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --success: #22c55e;
      --radius: 12px;
      --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Theater ──────────────────────────────────────────────────── */
    .theater {
      position: relative;
      width: 880px; height: 560px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 0 80px rgba(37,99,235,0.06), 0 25px 50px rgba(0,0,0,0.5);
    }

    /* ── Slides ───────────────────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      opacity: 0; transform: translateX(30px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      overflow-y: auto;
    }
    .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .slide.exit-left { opacity: 0; transform: translateX(-30px); }

    /* Template container */
    .slide-content {
      width: 100%; height: 100%;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    /* Override template styles to fit theater */
    .slide-content .cue-template { width: 100%; height: 100%; }

    /* ── Annotation Overlays ──────────────────────────────────────── */
    .annotation-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .ann-box {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 12px;
      opacity: 0; transform: scale(0.95);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }
    .ann-box-label {
      position: absolute; top: -22px; left: 12px;
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
    }
    .slide.active .ann-box { opacity: 0.5; transform: scale(1); }
    .ann-arrow {
      position: absolute;
      height: 2px;
      background: var(--accent);
      transform-origin: left center;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }
    .ann-arrow::after {
      content: '';
      position: absolute; right: -6px; top: -4px;
      border-left: 8px solid var(--accent);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }
    .ann-arrow-label {
      position: absolute; top: -20px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg); color: var(--accent-light);
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      border: 1px solid var(--accent);
      white-space: nowrap;
    }
    .slide.active .ann-arrow { opacity: 0.7; }
    .ann-text {
      position: absolute;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.5s ease 0.1s;
      pointer-events: none;
    }
    .slide.active .ann-text { opacity: 1; }

    /* ── Hotspot Overlays ─────────────────────────────────────────── */
    .hotspot {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0; transform: scale(0);
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 10;
    }
    .slide.active .hotspot { opacity: 0.75; transform: scale(1); }
    .hotspot::before {
      content: ''; position: absolute; inset: -6px;
      border-radius: 50%; border: 2px solid var(--accent);
      animation: hPulse 2s ease-in-out infinite;
    }
    @keyframes hPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0; transform: scale(1.8); }
    }
    .hotspot-label {
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: var(--bg); color: var(--accent-light);
      font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 5px;
      white-space: nowrap; border: 1px solid var(--accent);
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    .hotspot:hover .hotspot-label,
    .hotspot.always-show .hotspot-label { opacity: 1; }

    /* ── Pointer ──────────────────────────────────────────────────── */
    .pointer-cursor {
      position: absolute;
      width: 20px; height: 20px;
      z-index: 100; pointer-events: none;
    }
    .pointer-cursor svg {
      width: 20px; height: 20px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .pointer-cursor.clicking svg {
      transform: scale(0.85); transition: transform 0.1s;
    }

    /* ── Caption Bar ──────────────────────────────────────────────── */
    .caption-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 24px;
      background: linear-gradient(to top, rgba(10,15,26,0.96), rgba(10,15,26,0.75));
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
      z-index: 20;
    }
    .caption-text { font-size: 13px; color: var(--text); max-width: 580px; line-height: 1.5; }
    .caption-nav { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      width: 34px; height: 34px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-muted); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent-light); }
    .step-indicator { display: flex; gap: 4px; align-items: center; }
    .step-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim); transition: all 0.3s; cursor: pointer;
    }
    .step-dot.active { background: var(--accent); width: 22px; border-radius: 4px; }
    .step-label { font-size: 11px; color: var(--text-dim); margin-right: 8px; }

    /* ── Progress Bar ─────────────────────────────────────────────── */
    .progress-bar {
      position: absolute; top: 0; left: 0;
      height: 3px; background: var(--accent);
      z-index: 30; transition: width 0.3s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ── Badge ────────────────────────────────────────────────────── */
    .sdk-badge {
      position: absolute; top: 12px; right: 16px;
      background: var(--accent-glow); border: 1px solid var(--accent);
      color: var(--accent-light); font-size: 9px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      z-index: 25; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="theater" id="theater">
  <div class="progress-bar" id="progressBar"></div>
  <div class="sdk-badge">cue CueUtils + @cue-vin/templates</div>

<!-- ── @cue-vin/templates ESM ───────────────────────────────────── -->
<script type="module">

          { name: "phone", type: "tel", label: "Nomor HP", placeholder: "+62 812 3456 7890" }
        ],

        footerLinks: [
          { label: "Tanpa biaya daftar" },
          { label: "Proses < 5 menit" },
          { label: "Deposit awal Rp 0" }
        ]
      }},
      pointer: { x: 0.50, y: 0.72 },
      hotspots: [
        { id: "h-cta-benefits", x: 0.50, y: 0.84, label: "Tanpa biaya", alwaysShow: true }
      ],
      caption: "Bergabung dengan 2 juta+ pengguna — buka akun gratis hari ini, tanpa biaya tersembunyi.",
      cta: { type: "email_capture", label: "Buka Akun Gratis", placeholder: "Email Anda", submitLabel: "Daftar Sekarang", successMessage: "Selamat! Akun BankFlow Anda sudah aktif." }

// ── Verify CueUtils loaded ─────────────────────────────────────────
if (!window.CueUtils) {
  document.body.innerHTML = '<div style="color:#ef4444;padding:40px;text-align:center"><h2>CueUtils IIFE not loaded</h2><p>Make sure cue-utils.iife.js is accessible.</p></div>';
  throw new Error("CueUtils IIFE not loaded");
}
const { Timeline, Pointer } = window.CueUtils;

// ── DOM ────────────────────────────────────────────────────────────
const theater = document.getElementById('theater');
const slidesContainer = document.getElementById('slidesContainer');
const captionEl = document.getElementById('captionText');
const stepLabel = document.getElementById('stepLabel');
const stepIndicatorEl = document.getElementById('stepIndicator');
const progressBar = document.getElementById('progressBar');
const pointerEl = document.getElementById('pointer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const totalSteps = DEMO_SCRIPT.steps.length;

// ── Theme for templates ────────────────────────────────────────────
const theme = {
  accent: DEMO_SCRIPT.theme?.accent || "#2563EB",
  bg: DEMO_SCRIPT.theme?.bg || "#0a0f1a",
  bgCard: "#111827",
  bgInput: "#1e293b",
  border: "#1e293b",
  text: "#f1f5f9",
  textMuted: "#94a3b8",
  textDim: "#64748b",
  font: DEMO_SCRIPT.theme?.font || "'Inter','Segoe UI',system-ui,sans-serif",
  radius: 12,
};

// ── Build Slides ───────────────────────────────────────────────────
const slideEls = [];
DEMO_SCRIPT.steps.forEach((step, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.id = `slide-${i}`;

  // Render template content
  if (step.template) {
    const config = { type: step.template.type, ...(step.template.data || {}) };
    const html = renderTemplate(config, theme);
    const content = document.createElement('div');
    content.className = 'slide-content';
    content.innerHTML = html;
    slide.appendChild(content);
  }

  // Render annotations
  if (step.annotations && step.annotations.length > 0) {
    const layer = document.createElement('div');
    layer.className = 'annotation-layer';
    step.annotations.forEach(ann => {
      if (ann.type === 'box') {
        const el = document.createElement('div');
        el.className = 'ann-box';
        el.style.left = (ann.x * 100) + '%';
        el.style.top = (ann.y * 100) + '%';
        el.style.width = (ann.width * 100) + '%';
        el.style.height = (ann.height * 100) + '%';
        if (ann.color) el.style.borderColor = ann.color;
        if (ann.cornerRadius) el.style.borderRadius = ann.cornerRadius + 'px';
        if (ann.label) {
          const lbl = document.createElement('span');
          lbl.className = 'ann-box-label';
          lbl.textContent = ann.label;
          el.appendChild(lbl);
        }
        layer.appendChild(el);
      } else if (ann.type === 'arrow') {
        const el = document.createElement('div');
        el.className = 'ann-arrow';
        el.style.left = (ann.x1 * 100) + '%';
        el.style.top = (ann.y1 * 100) + '%';
        const dx = ann.x2 - ann.x1, dy = ann.y2 - ann.y1;
        const len = Math.sqrt(dx*dx + dy*dy) * 100;
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        el.style.width = len + '%';
        el.style.transform = `rotate(${angle}deg)`;
        if (ann.color) el.style.background = ann.color;
        if (ann.label) {
          const lbl = document.createElement('span');
          lbl.className = 'ann-arrow-label';
          lbl.textContent = ann.label;
          el.appendChild(lbl);
        }
        layer.appendChild(el);
      } else if (ann.type === 'text') {
        const el = document.createElement('div');
        el.className = 'ann-text';
        el.style.left = (ann.x * 100) + '%';
        el.style.top = (ann.y * 100) + '%';
        el.textContent = ann.text;
        if (ann.color) el.style.color = ann.color;
        if (ann.fontSize) el.style.fontSize = ann.fontSize + 'px';
        if (ann.align === 'center') { el.style.transform = 'translateX(-50%)'; el.style.textAlign = 'center'; }
        layer.appendChild(el);
      }
    });
    slide.appendChild(layer);
  }

  // Render hotspots
  if (step.hotspots) {
    step.hotspots.forEach(h => {
      const el = document.createElement('div');
      el.className = 'hotspot' + (h.alwaysShow ? ' always-show' : '');
      el.style.left = `calc(${h.x * 100}% - 9px)`;
      el.style.top = `calc(${h.y * 100}% - 9px)`;
      const lbl = document.createElement('span');
      lbl.className = 'hotspot-label';
      lbl.textContent = h.label;
      el.appendChild(lbl);
      slide.appendChild(el);
    });
  }

  slidesContainer.appendChild(slide);
  slideEls.push(slide);
});

// ── Build Dots ─────────────────────────────────────────────────────
for (let i = 0; i < totalSteps; i++) {
  const dot = document.createElement('div');
  dot.className = 'step-dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goToStep(i));
  stepIndicatorEl.appendChild(dot);
}

// ── CueUtils.Pointer ───────────────────────────────────────────────
const pointer = new Pointer({
  startX: theater.offsetWidth * 0.5,
  startY: theater.offsetHeight * 0.58,
  defaultDuration: 500,
  onChange: (state) => {
    pointerEl.style.left = state.x + 'px';
    pointerEl.style.top = state.y + 'px';
    pointerEl.style.transitionDuration = state.transition;
    if (state.clicking) pointerEl.classList.add('clicking');
    else pointerEl.classList.remove('clicking');
  },
});

// ── State ──────────────────────────────────────────────────────────
let currentStep = 0;
let autoTimeline = null;

// ── Go To Step ─────────────────────────────────────────────────────
function goToStep(index) {
  if (index < 0) index = DEMO_SCRIPT.loop ? totalSteps - 1 : 0;
  if (index >= totalSteps) index = DEMO_SCRIPT.loop ? 0 : totalSteps - 1;

  const prev = currentStep;
  currentStep = index;
  const step = DEMO_SCRIPT.steps[currentStep];

  // Slides
  slideEls.forEach((s, i) => {
    s.classList.remove('active', 'exit-left');
    if (i === prev && i !== currentStep) s.classList.add('exit-left');
  });
  requestAnimationFrame(() => slideEls[currentStep].classList.add('active'));

  // Caption
  captionEl.textContent = step.caption || '';

  // Step label
  stepLabel.textContent = `${currentStep + 1} / ${totalSteps}`;

  // Dots
  stepIndicatorEl.querySelectorAll('.step-dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentStep));

  // Progress
  progressBar.style.width = ((currentStep + 1) / totalSteps * 100) + '%';

  // Pointer — use CueUtils.Pointer.moveTo()
  if (step.pointer) {
    pointer.moveTo(
      step.pointer.x * theater.offsetWidth,
      step.pointer.y * theater.offsetHeight,
      600
    );
    // Simulate click after move
    setTimeout(() => pointer.click(150), 600);
  }

  // Auto-advance — use CueUtils.Timeline
  if (autoTimeline) { autoTimeline.dispose(); autoTimeline = null; }
  if (step.duration && step.duration > 0) {
    autoTimeline = new Timeline({ loop: false });
    autoTimeline.add(step.duration, () => goToStep(currentStep + 1));
    autoTimeline.play();
  }
}

// ── Navigation ─────────────────────────────────────────────────────
prevBtn.addEventListener('click', () => {
  if (autoTimeline) { autoTimeline.dispose(); autoTimeline = null; }
  goToStep(currentStep - 1);
});
nextBtn.addEventListener('click', () => {
  if (autoTimeline) { autoTimeline.dispose(); autoTimeline = null; }
  goToStep(currentStep + 1);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    if (autoTimeline) { autoTimeline.dispose(); autoTimeline = null; }
    goToStep(currentStep + 1); e.preventDefault();
  }
  if (e.key === 'ArrowLeft') {
    if (autoTimeline) { autoTimeline.dispose(); autoTimeline = null; }
    goToStep(currentStep - 1); e.preventDefault();
  }
});

// ── Init ───────────────────────────────────────────────────────────
goToStep(0);
</script>
</body>
</html>
